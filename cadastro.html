<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Derivativos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="assets/css/cadastro.css">

</head>

<body>
    <h1>Cadastro</h1>
    <label for="derivativoInput">Derivativo:</label>
    <input type="number" id="derivativoInput">
    <label for="tempoMontInput">Tempo de Montagem:</label>
    <input type="number" id="tempoMontInput">
    <label for="tempoStdInput">Tempo Standard:</label>
    <input type="number" id="tempoStdInput">
    <div class="button-container">
        <button id="cadastrarButton">Cadastrar</button>
    </div>
    
    <label for="selecionarRegistro">Excluir Cadastro:</label>
    <select id="selecionarRegistro">
        <!-- Opções para selecionar registros no arquivo cadastrarderivativos.js -->
    </select>
    <div class="button-container">
        <button id="excluirButton">Excluir Registro</button>
        <button id="salvarButton">Salvar</button>
        <a href="index.html" id="voltarButton" class="button btnvoltar">Voltar</a>
    </div>

    <h2>Valores Cadastrados</h2>
    <!-- No arquivo cadastrarderivativos.js -->
    <ul id="valoresPredefinidos"></ul>
    <!-- // Preencha a lista de seleção com os registros existentes -->
    <script src="assets/js/cadastrarderivativos.js"></script>
</body>

</html>
